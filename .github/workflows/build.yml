name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Verify Python environment
      run: |
        python --version
        pip list
        python -c "import openpyxl; print('openpyxl OK')"
        python -c "import PyQt6; print('PyQt6 OK')"
        python -c "import msoffcrypto; print('msoffcrypto OK')"
    
    - name: Build EXE
      run: |
        pyinstaller --name "加密Excel合并拆分工具" `
          --windowed `
          --onefile `
          --hidden-import openpyxl `
          --hidden-import olefile `
          --hidden-import cryptography `
          --hidden-import msoffcrypto `
          --hidden-import PyQt6 `
          --hidden-import PyQt6.sip `
          --exclude-module tkinter `
          --exclude-module unittest `
          --noconfirm `
          main.py
      
    - name: Check output
      run: |
        if (Test-Path "dist\加密Excel合并拆分工具.exe") {
          $size = (Get-Item "dist\加密Excel合并拆分工具.exe").Length
          Write-Host "✓ EXE 文件生成成功"
          Write-Host "文件大小: $([math]::Round($size/1MB, 2)) MB"
        } else {
          Write-Host "✗ EXE 文件未找到"
          exit 1
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: 加密Excel合并拆分工具-Windows
        path: dist/加密Excel合并拆分工具.exe
        retention-days: 30
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/加密Excel合并拆分工具.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build macOS App
      run: |
        pyinstaller --name "加密Excel合并拆分工具" \
          --windowed \
          --onefile \
          --hidden-import openpyxl \
          --hidden-import olefile \
          --hidden-import cryptography \
          --hidden-import msoffcrypto \
          --hidden-import PyQt6 \
          --hidden-import PyQt6.sip \
          --exclude-module tkinter \
          --exclude-module unittest \
          --noconfirm \
          main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: 加密Excel合并拆分工具-macOS
        path: dist/加密Excel合并拆分工具.app
        retention-days: 30
